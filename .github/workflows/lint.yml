name: Lint

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  lint:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 24 # LTS
      - run: node --check public/app.js
      - run: node --check scripts/refresh.mjs
      - run: node --test
      - run: node scripts/refresh.mjs --sample --output /tmp/heat-index.json --history /tmp/heat-index-history.json
