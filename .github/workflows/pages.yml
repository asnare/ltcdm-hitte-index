name: Publish GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:
  schedule:
    - cron: "*/5 * * * *"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-24.04
    environment:
      name: public
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 24 # LTS
      - name: Restore published history
        env:
          HISTORY_URL: https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/data/heat-index-history.json
        run: |
          mkdir -p public/data
          curl --fail --silent --show-error --location "$HISTORY_URL" --output public/data/heat-index-history.json || true
      - name: Refresh heat-index data
        run: node scripts/refresh.mjs --output public/data/heat-index.json --history public/data/heat-index-history.json
      - uses: actions/configure-pages@983d7736d9b0ae728b81ab479565c72886d7745b # v5
      - name: Archive Pages artifact
        run: |
          tar \
            --dereference --hard-dereference \
            --directory public \
            -cvf "$RUNNER_TEMP/artifact.tar" \
            --exclude=.git \
            --exclude=.github \
            .
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: github-pages
          path: ${{ runner.temp }}/artifact.tar
          retention-days: 1
          if-no-files-found: error
      - id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e # v4
